services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: transitops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-TransitOps@2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-transit_ops}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transitops

  # Express Backend
  server:
    build: ./server
    container_name: transitops-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-TransitOps@2026}@db:3306/${MYSQL_DATABASE:-transit_ops}
      JWT_SECRET: ${JWT_SECRET:-transit-ops-super-secret-key-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "${API_PORT:-5000}:5000"
    networks:
      - transitops

  # React Frontend (Nginx)
  client:
    build: ./client
    container_name: transitops-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-80}:80"
    networks:
      - transitops

volumes:
  mysql_data:

networks:
  transitops:
    driver: bridge
